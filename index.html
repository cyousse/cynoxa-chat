function parseInline(text, ki=0) {
  const out=[]; let rem=text||""; let k=ki*300;
  while(rem){
    const b=rem.match(/\*\*(.+?)\*\*/),c=rem.match(/`([^`\n]+)`/);
    const hits=[b&&{t:"b",m:b},c&&{t:"c",m:c}].filter(Boolean).sort((a,x)=>a.m.index-x.m.index);
    if(!hits.length){out.push(<span key={k++}>{rem}</span>);break;}
    const {t,m}=hits[0];
    if(m.index>0)out.push(<span key={k++}>{rem.slice(0,m.index)}</span>);
    if(t==="b")out.push(<strong key={k++} style={{fontWeight:700,color:"#1a1a2e"}}>{m[1]}</strong>);
    if(t==="c")out.push(<code key={k++} style={{background:"rgba(0,150,60,.1)",padding:"1px 6px",borderRadius:4,fontFamily:"monospace",fontSize:"0.87em",color:"#006622"}}>{m[1]}</code>);
    rem=rem.slice(m.index+m[0].length);
  }
  return out;
}

function MD({text}){
  const lines=(text||"").split("\n");const out=[];let i=0,k=0;
  while(i<lines.length){
    const l=lines[i];
    if(l.startsWith("```")){
      const lang=l.slice(3).trim();const code=[];i++;
      while(i<lines.length&&!lines[i].startsWith("```")){code.push(lines[i]);i++;}
      out.push(<div key={k++} style={{background:"rgba(0,0,0,.05)",border:"1px solid rgba(0,0,0,.08)",borderRadius:8,margin:"10px 0",overflow:"hidden"}}>
        {lang&&<div style={{padding:"4px 14px",background:"rgba(0,0,0,.04)",fontSize:11,color:"#888",letterSpacing:1,borderBottom:"1px solid rgba(0,0,0,.07)",textTransform:"uppercase",fontFamily:"monospace"}}>{lang}</div>}
        <pre style={{margin:0,padding:"12px 14px",overflowX:"auto"}}><code style={{fontFamily:"monospace",fontSize:13,color:"#1a1a2e",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>{code.join("\n")}</code></pre>
      </div>);i++;continue;
    }
    const hm=l.match(/^(#{1,3}) (.+)/);
    if(hm){const lv=hm[1].length,sz=[20,17,15][lv-1],col=lv===3?G:"#1a1a2e";
      out.push(<div key={k++} style={{fontSize:sz,fontWeight:700,color:col,margin:"12px 0 5px",lineHeight:1.3}}>{parseInline(hm[2],k)}</div>);i++;continue;}
    if(/^[-*] /.test(l)){
      out.push(<div key={k++} style={{display:"flex",gap:8,margin:"3px 0",alignItems:"flex-start"}}>
        <span style={{color:G,flexShrink:0,marginTop:4,fontSize:10}}>▶</span>
        <span style={{lineHeight:1.75}}>{parseInline(l.slice(2),k)}</span>
      </div>);i++;continue;
    }
    const nm=l.match(/^(\d+)\. (.+)/);
    if(nm){
      out.push(<div key={k++} style={{display:"flex",gap:8,margin:"3px 0",alignItems:"flex-start"}}>
        <span style={{color:G,flexShrink:0,fontWeight:700,minWidth:20,fontSize:13}}>{nm[1]}.</span>
        <span style={{lineHeight:1.75}}>{parseInline(nm[2],k)}</span>
      </div>);i++;continue;
    }
    if(l.startsWith("---")){out.push(<hr key={k++} style={{border:"none",borderTop:"1px solid rgba(0,0,0,.1)",margin:"12px 0"}}/>);i++;continue;}
    if(!l.trim()){out.push(<div key={k++} style={{height:8}}/>);i++;continue;}
    out.push(<p key={k++} style={{margin:"4px 0",lineHeight:1.75}}>{parseInline(l,k)}</p>);
    i++;
  }
  return <div style={{color:"#2a2a3e",fontSize:14.5}}>{out}</div>;
}

async function streamAPI(messages,model,system,onChunk,onDone,onErr){
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model,max_tokens:2048,stream:true,system,messages}),
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));onErr(e.error?.message||`Erreur ${res.status}`);return;}
    const reader=res.body.getReader(),dec=new TextDecoder();let buf="";
    for(;;){
      const {done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split("\n");buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith("data: "))continue;
        const raw=line.slice(6).trim();if(raw==="[DONE]"){onDone();return;}
        try{const p=JSON.parse(raw);
          if(p.type==="content_block_delta"&&p.delta?.type==="text_delta")onChunk(p.delta.text);
          if(p.type==="message_stop"){onDone();return;}
        }catch{}
      }
    }
    onDone();
  }catch(e){onErr(e.message);}
}
